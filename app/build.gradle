import java.util.regex.Pattern

apply plugin: 'com.android.application'
apply plugin: 'androidx.navigation.safeargs'

android {
    compileSdkVersion 30
    buildToolsVersion "29.0.3"

    defaultConfig {
        applicationId "org.d1scw0rld.bookbag"
        minSdkVersion 14
        targetSdkVersion 30
//        compileOptions {
//            sourceCompatibility JavaVersion.VERSION_1_7
//            targetCompatibility JavaVersion.VERSION_1_7
//        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.txt'
            applicationVariants.all { variant ->
//                variant.outputs.each { output ->
//                    println("new filename" +outputFileName )
//                    def projectName = 'BookBag'
//                    def newName = output.outputFile.name
//                    newName = newName.replace("app-", projectName + '-')
//                    def manifestFile = file("src/main/AndroidManifest.xml")
//                    def patternVersionNumber = Pattern.compile("versionName=\"(\\d+)\\.(\\d+)\\.(\\d+)\"")
//                    def manifestText = manifestFile.getText()
//                    def matcherVersionNumber = patternVersionNumber.matcher(manifestText)
//                    matcherVersionNumber.find()
//
//                    newName = newName.replace("-release", '-' + matcherVersionNumber.group(1) + '.' + matcherVersionNumber.group(2) + '.' + matcherVersionNumber.group(3))
//                    output.outputFileName = new File("", newName)
//                }
                variant.outputs.all {
                    println("new filename" + outputFileName )
                    def projectName = 'BookBag'
//                    project.ext { appName = 'my_app' }
                    def newName = outputFileName
                    newName = newName.replace("app-", projectName + '-')
                    def manifestFile = file("src/main/AndroidManifest.xml")
                    def patternVersionNumber = Pattern.compile("versionName=\"(\\d+)\\.(\\d+)\\.(\\d+)\"")
                    def manifestText = manifestFile.getText()
                    def matcherVersionNumber = patternVersionNumber.matcher(manifestText)
                    matcherVersionNumber.find()

                    newName = newName.replace("-release", '-' + matcherVersionNumber.group(1) + '.' + matcherVersionNumber.group(2) + '.' + matcherVersionNumber.group(3))
                    outputFileName = new File("", newName)
                }
            }
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.legacy:legacy-support-v4:1.0.0'
    implementation 'com.google.android.material:material:1.3.0'
//    implementation 'androidx.legacy:legacy-preference-v14:1.0.0'
//    implementation 'com.android.support:preference-v14:30.0.0'
    implementation "androidx.preference:preference:1.1.1"
    // Keep this lower version, because of ugly preferences screen look
    implementation 'com.wdullaer:materialdatetimepicker:3.6.4'

    implementation 'androidx.navigation:navigation-fragment:2.3.4'
    implementation 'androidx.navigation:navigation-ui:2.3.4'

    implementation 'androidx.constraintlayout:constraintlayout:2.0.4'
}
